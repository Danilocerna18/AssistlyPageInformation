<section class="value-section">
  <div class="container">
    <span class="section-label">Por qué Assistly</span>
    <h2 class="section-title">Diferente desde la raíz.</h2>
    <p class="section-sub">
      No optimizamos el e-commerce existente. Lo repensamos desde cero para que
      comprar sea una experiencia que disfrutes, no que sufras.
    </p>

    <div class="row g-4 mt-2">
      <div class="col-md-6" *ngFor="let item of values">
        <div class="value-item">
          <div class="value-check">
            <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline
                points="1.5,6 4.5,9 10.5,3"
                stroke="#1D9E75"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <h4>{{ item.title }}</h4>
            <p>{{ item.description }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
